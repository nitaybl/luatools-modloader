<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LuaTools Mod Loader - Documentation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
    <style>
        :root {
            --base-background-color: #0d1117;
            --cover-background-color: linear-gradient(135deg, #0d1117, #1a1a2e);
            --sidebar-background: #0d1117;
            --sidebar-border-color: rgba(0, 255, 255, 0.1);
            --link-color: #00ffff;
            --link-color--hover: #8b5cf6;
            --heading-color: #ffffff;
            --base-color: #c9d1d9;
            --code-theme-background: #161b22;
        }
        .sidebar-nav a:hover { color: #00ffff !important; }
        .app-name { color: #00ffff !important; font-weight: 700; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
        window.$docsify = {
            name: 'LuaTools Mod Loader',
            repo: 'nitaybl/luatools-modloader',
            loadSidebar: true,
            subMaxLevel: 3,
            search: { placeholder: 'Search docs...', noData: 'No results', depth: 3 },
            auto2top: true,
            coverpage: false,
            themeable: { readyTransition: true }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-powershell.min.js"></script>
</body>
</html>
